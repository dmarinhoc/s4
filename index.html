<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>S4 Sync Agent · Assistente da Migração SAP S4 HANA · Bracell</title>
<style>
  /* ===================================================================
     S4 SYNC AGENT — Assistente de dúvidas da migração SAP S4 HANA (Bracell)
     Arquivo único. Não precisa de internet nem instalação.
     Para editar as perguntas, vá até a seção "PERGUNTAS E RESPOSTAS"
     mais abaixo (procure por "INÍCIO DA BASE DE PERGUNTAS").
     =================================================================== */

  :root{
    --verde-bracell: #0F6E56;   /* verde principal (cabeçalho, botões)  */
    --verde-escuro:  #04342C;   /* texto sobre verde claro              */
    --verde-claro:   #E1F5EE;   /* fundo de balões e sugestões          */
    --verde-medio:   #9FE1CB;   /* bordas suaves                        */
    --verde-vivo:    #97C459;   /* detalhe / indicador online           */
    --cinza-fundo:   #F4F5F3;
    --cinza-borda:   #E2E5E1;
    --texto:         #1d211f;
    --texto-suave:   #5f6b66;
    --branco:        #ffffff;
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; height:100%; }
  body{
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--cinza-fundo);
    color: var(--texto);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ---------- Cabeçalho ---------- */
  header{
    background: var(--verde-bracell);
    color: #fff;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
    z-index: 2;
  }
  .logo{
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--verde-claro);
    color: var(--verde-escuro);
    display:flex; align-items:center; justify-content:center;
    font-weight: 700; font-size: 17px;
    flex-shrink: 0;
    /* Para usar o logo da Bracell, troque por:
       background: url('logo-bracell.png') center/cover; e apague o texto "S4" no HTML */
  }
  header .titulo{ flex:1; min-width:0; }
  header .titulo h1{ margin:0; font-size: 18px; font-weight: 600; }
  header .titulo p{ margin:2px 0 0; font-size: 12.5px; color: var(--verde-medio); }
  .online{ display:flex; align-items:center; gap:6px; font-size:12px; color:var(--verde-medio); }
  .online .dot{ width:9px; height:9px; border-radius:50%; background: var(--verde-vivo); }

  /* ---------- Área de conversa ---------- */
  .chat{
    flex:1;
    overflow-y: auto;
    padding: 20px 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .chat-inner{ width:100%; max-width: 720px; margin: 0 auto; display:flex; flex-direction:column; gap:14px; }

  .balao{
    max-width: 88%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 15px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .balao.bot{
    align-self: flex-start;
    background: var(--branco);
    border: 1px solid var(--cinza-borda);
    border-bottom-left-radius: 4px;
  }
  .balao.user{
    align-self: flex-end;
    background: var(--verde-bracell);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .balao.bot strong{ color: var(--verde-bracell); }
  .balao.bot a{ color: var(--verde-bracell); font-weight:600; }

  /* indicador "digitando…" */
  .digitando{ display:flex; gap:5px; align-items:center; padding: 14px 18px !important; }
  .digitando span{
    width:8px; height:8px; border-radius:50%;
    background: var(--verde-medio);
    animation: pisca 1.2s infinite ease-in-out;
  }
  .digitando span:nth-child(2){ animation-delay: .2s; }
  .digitando span:nth-child(3){ animation-delay: .4s; }
  @keyframes pisca{
    0%, 60%, 100%{ transform: translateY(0); opacity:.4; }
    30%{ transform: translateY(-4px); opacity:1; }
  }

  /* sugestões / chips */
  .chips{ align-self: flex-start; display:flex; flex-wrap:wrap; gap:8px; max-width: 95%; }
  .chip{
    font-size: 13.5px;
    background: var(--verde-claro);
    color: var(--verde-bracell);
    border: 1px solid var(--verde-medio);
    padding: 7px 14px;
    border-radius: 18px;
    cursor: pointer;
    transition: background .15s;
  }
  .chip:hover{ background: var(--verde-medio); }

  /* respostas relacionadas */
  .relacionadas{ margin-top:10px; padding-top:10px; border-top:1px solid var(--cinza-borda); }
  .relacionadas .rotulo{ font-size:12px; color:var(--texto-suave); margin-bottom:6px; }

  /* ---------- Barra de digitação ---------- */
  .barra{
    border-top: 1px solid var(--cinza-borda);
    background: var(--branco);
    padding: 12px 16px;
  }
  .barra-inner{
    width:100%; max-width:720px; margin:0 auto;
    display:flex; gap:10px; align-items:center;
  }
  #campo{
    flex:1;
    border: 1px solid var(--cinza-borda);
    border-radius: 22px;
    padding: 11px 18px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
  }
  #campo:focus{ border-color: var(--verde-bracell); }
  #enviar{
    width: 44px; height: 44px;
    border:none; border-radius:50%;
    background: var(--verde-bracell);
    color:#fff; font-size:20px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  #enviar:hover{ background: #0c5a47; }
  .rodape{ text-align:center; font-size:11.5px; color:var(--texto-suave); margin-top:8px; }

  /* scrollbar discreta */
  .chat::-webkit-scrollbar{ width:8px; }
  .chat::-webkit-scrollbar-thumb{ background:#d3d8d4; border-radius:4px; }
</style>
</head>

    resposta: "O suporte segue uma escada:\n\n1. Usuário aciona o <strong>Key User da sua área</strong>\n2. Key User valida e abre o chamado <strong>com evidências</strong>\n3. TI classifica e direciona (funcional/técnico)\n4. Consultoria atua na solução\n5. Retorno é comunicado pelo chamado\n6. Key User valida e fecha\n\nAo reportar um erro, sempre inclua: <strong>descrição do erro, prints e evidências</strong> (logs, mensagens, horários e usuários impactados).",
    categoria: "Suporte"
  },
  {
    pergunta: "Importações e pedidos MRO no cutover",
    chaves: "importacao, mro, zimp, pedido importacao, internacional, embarque, pagamento antecipado, importacoes, importado, exterior, maritimo, aereo",
    resposta: "Pontos sobre importações / MRO:\n\n• ~95% das importações são com <strong>pagamento antecipado</strong>\n• Pagamento ao fornecedor internacional p/ liberar embarque: até <strong>20/05/2026</strong>\n• Embarques aéreos: até <strong>30/05/2026</strong>\n• Embarques marítimos fora de curso ficam para a <strong>1ª quinzena de julho/2026</strong>\n\nAtenção a inconsistências comuns: tipo de pedido incorreto, divergência com a order confirmation e ZIMP alocado como compra nacional.",
    categoria: "Importação"
  }
  /* ➕ Cole novas perguntas aqui, sempre com vírgula antes do { */
];

/* Mensagem quando o S4 Sync Agent não encontra resposta.
   Já traz os contatos reais da equipe de Compras. */
const SEM_RESPOSTA =
  "Hmm, não encontrei isso na minha base ainda. 🤔\n\n" +
  "Tente reformular com outras palavras, ou fale com a equipe de Compras / Suprimentos:\n" +
  "• Humberto Menezes — Humberto_Menezes@bracell.com\n" +
  "• Rodrigo Carvalho — rocarvalho@bracell.com\n" +
  "• Jaqueline Prandini — jmprandini@bracell.com";

/* Quantas sugestões mostrar no início e nas relacionadas */
const QTD_SUGESTOES = 4;

/* ⬆️ FIM DA BASE DE PERGUNTAS — daqui pra baixo é o funcionamento ⬆️
   (não precisa mexer no resto, a não ser que queira mudar o comportamento)
   =================================================================== */

const chatInner = document.getElementById('chatInner');
const campo = document.getElementById('campo');
const enviar = document.getElementById('enviar');
const chat = document.getElementById('chat');

/* normaliza texto: minúsculas e sem acento, pra comparar melhor */
function normalizar(t){
  return (t || "").toLowerCase()
    .normalize("NFD").replace(/[̀-ͯ]/g, "")
    .replace(/[^a-z0-9\s]/g, " ")
    .replace(/\s+/g, " ").trim();
}

/* dá uma pontuação de quanto a pergunta do usuário combina com cada item */
function pontuar(textoUsuario, item){
  const u = normalizar(textoUsuario);
  const palavrasUsuario = u.split(" ").filter(p => p.length > 2);
  const alvo = normalizar(item.chaves + " " + item.pergunta);
  let pontos = 0;
  palavrasUsuario.forEach(p => {
    if (alvo.includes(p)) pontos += 2;
  });
  /* bônus se a frase inteira aparece */
  if (u.length > 4 && alvo.includes(u)) pontos += 3;
  return pontos;
}

function buscar(texto){
  const ranqueadas = PERGUNTAS
    .map(item => ({ item, pontos: pontuar(texto, item) }))
    .filter(r => r.pontos > 0)
    .sort((a,b) => b.pontos - a.pontos);
  return ranqueadas;
}

/* adiciona um balão na conversa */
function balao(tipo, html){
  const div = document.createElement('div');
  div.className = 'balao ' + tipo;
  div.innerHTML = html;
  chatInner.appendChild(div);
  rolar();
  return div;
}

function rolar(){ chat.scrollTop = chat.scrollHeight; }

/* monta os chips clicáveis de sugestão */
function chips(lista, rotulo){
  const wrap = document.createElement('div');
  if (rotulo){
    const r = document.createElement('div');
    r.className = 'relacionadas';
    const lab = document.createElement('div');
    lab.className = 'rotulo';
    lab.textContent = rotulo;
    r.appendChild(lab);
    wrap.appendChild(r);
  }
  const chipsDiv = document.createElement('div');
  chipsDiv.className = 'chips';
  lista.forEach(item => {
    const c = document.createElement('span');
    c.className = 'chip';
    c.textContent = item.pergunta;
    c.onclick = () => responder(item.pergunta);
    chipsDiv.appendChild(c);
  });
  wrap.appendChild(chipsDiv);
  chatInner.appendChild(wrap);
  rolar();
}

/* Tempo do "digitando…" antes de responder (em milissegundos).
   Ajuste aqui se quiser mais rápido ou mais lento. */
const ESPERA_MIN = 900;    /* mínimo */
const ESPERA_MAX = 2200;   /* máximo */

/* mostra o balão de "digitando…" e devolve o elemento pra remover depois */
function mostrarDigitando(){
  const div = document.createElement('div');
  div.className = 'balao bot digitando';
  div.innerHTML = '<span></span><span></span><span></span>';
  chatInner.appendChild(div);
  rolar();
  return div;
}

/* fluxo principal: usuário pergunta, S4 Sync Agent responde */
function responder(texto){
  texto = (texto || "").trim();
  if (!texto) return;

  balao('user', escapar(texto));
  campo.value = "";

  const resultados = buscar(texto);

  /* tempo proporcional ao tamanho da resposta, dentro dos limites */
  const respostaTexto = resultados.length ? resultados[0].item.resposta : SEM_RESPOSTA;
  const espera = Math.min(ESPERA_MAX, Math.max(ESPERA_MIN, respostaTexto.length * 9));

  const digitando = mostrarDigitando();

  setTimeout(() => {
    digitando.remove();

    if (resultados.length === 0){
      balao('bot', escapar(SEM_RESPOSTA).replace(/\n/g, "<br>"));
      chips(PERGUNTAS.slice(0, QTD_SUGESTOES), "Talvez uma destas ajude:");
      return;
    }

    const melhor = resultados[0].item;
    balao('bot', melhor.resposta.replace(/\n/g, "<br>"));

    /* mostra outras relacionadas, se houver */
    const outras = resultados.slice(1, QTD_SUGESTOES + 1).map(r => r.item);
    if (outras.length > 0){
      chips(outras, "Veja também:");
    }
  }, espera);
}

function escapar(t){
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

/* Atraso da mensagem de boas-vindas (menor que o das respostas) */
const ESPERA_BOAS_VINDAS = 650;

/* saudação inicial — aparece com um pequeno "digitando…" antes */
function iniciar(){
  const digitando = mostrarDigitando();
  setTimeout(() => {
    digitando.remove();
    balao('bot', "Olá! Eu sou o <strong>S4 Sync Agent</strong> 🔄<br>Posso ajudar com dúvidas sobre compras no novo SAP S4 HANA. Sobre o que você quer saber?");
    chips(PERGUNTAS.slice(0, QTD_SUGESTOES), "Perguntas mais comuns:");
  }, ESPERA_BOAS_VINDAS);
}

/* eventos */
enviar.onclick = () => responder(campo.value);
campo.addEventListener('keydown', e => { if (e.key === 'Enter') responder(campo.value); });

iniciar();
campo.focus();
</script>
