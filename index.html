<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">

<title>S4 Sync Agent · Assistente da Migração SAP S4 HANA · Bracell</title>
<style>
  /* ===================================================================
     S4 SYNC AGENT — Assistente de dúvidas da migração SAP S4 HANA (Bracell)
     Arquivo único. Não precisa de internet nem instalação.
     Para editar as perguntas, vá até a seção "PERGUNTAS E RESPOSTAS"
     mais abaixo (procure por "INÍCIO DA BASE DE PERGUNTAS").
     =================================================================== */

  :root{
    /* Paleta oficial Bracell (Corporate Identity Guide) */
    --azul-bracell:  #0047BA;   /* azul primário — cabeçalho, botões    */
    --azul-escuro:   #00337A;   /* hover do azul                        */
    --azul-claro:    #EAF1FC;   /* fundo de sugestões                   */
    --azul-borda:    #C5D9F5;   /* bordas suaves                        */
    --azul-suave:    #BBD0F2;   /* texto claro sobre o azul             */
    --verde-bracell: #A4D55D;   /* verde de destaque (folha/indicador)  */
    --cinza-fundo:   #F4F5F7;
    --cinza-borda:   #E3E6EB;
    --texto:         #333333;   /* preto 80% (padrão Bracell)           */
    --texto-suave:   #6B7280;
    --branco:        #ffffff;
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; height:100%; }
  body{
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--cinza-fundo);
    color: var(--texto);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ---------- Cabeçalho ---------- */
  header{
    background: var(--azul-bracell);
    color: #fff;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,.10);
    z-index: 2;
  }
  .logo-img{
    height: 28px; width: auto; display: block; flex-shrink: 0;
    /* Logo oficial Bracell (versão Reversed white) */
  }
  .divisor{ width:1px; height:30px; background: rgba(255,255,255,.35); flex-shrink:0; }
  header .titulo{ flex:1; min-width:0; }
  header .titulo h1{ margin:0; font-size: 17px; font-weight: 600; }
  header .titulo p{ margin:2px 0 0; font-size: 12.5px; color: var(--azul-suave); }
  .online{ display:flex; align-items:center; gap:6px; font-size:12px; color:var(--azul-suave); }
  .online .dot{ width:9px; height:9px; border-radius:50%; background: var(--verde-bracell); }

  /* ---------- Área de conversa ---------- */
  .chat{
    flex:1;
    overflow-y: auto;
    padding: 20px 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .chat-inner{ width:100%; max-width: 720px; margin: 0 auto; display:flex; flex-direction:column; gap:14px; }

  .balao{
    max-width: 88%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 15px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .balao.bot{
    align-self: flex-start;
    background: var(--branco);
    border: 1px solid var(--cinza-borda);
    border-bottom-left-radius: 4px;
  }
  .balao.user{
    align-self: flex-end;
    background: var(--azul-bracell);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .balao.bot strong{ color: var(--azul-bracell); }
  .balao.bot a{ color: var(--azul-bracell); font-weight:600; }

  /* indicador "digitando…" */
  .digitando{ display:flex; gap:5px; align-items:center; padding: 14px 18px !important; }
  .digitando span{
    width:8px; height:8px; border-radius:50%;
    background: #9DBDEE;
    animation: pisca 1.2s infinite ease-in-out;
  }
  .digitando span:nth-child(2){ animation-delay: .2s; }
  .digitando span:nth-child(3){ animation-delay: .4s; }
  @keyframes pisca{
    0%, 60%, 100%{ transform: translateY(0); opacity:.4; }
    30%{ transform: translateY(-4px); opacity:1; }
  }

  /* sugestões / chips */
  .chips{ align-self: flex-start; display:flex; flex-wrap:wrap; gap:8px; max-width: 95%; }
  .chip{
    font-size: 13.5px;
    background: var(--azul-claro);
    color: var(--azul-bracell);
    border: 1px solid var(--azul-borda);
    padding: 7px 14px;
    border-radius: 18px;
    cursor: pointer;
    transition: background .15s;
  }
  .chip:hover{ background: #D6E4FA; }

  /* respostas relacionadas */
  .relacionadas{ margin-top:10px; padding-top:10px; border-top:1px solid var(--cinza-borda); }
  .relacionadas .rotulo{ font-size:12px; color:var(--texto-suave); margin-bottom:6px; }

  /* ---------- Barra de digitação ---------- */
  .barra{
    border-top: 1px solid var(--cinza-borda);
    background: var(--branco);
    padding: 12px 16px;
  }
  .barra-inner{
    width:100%; max-width:720px; margin:0 auto;
    display:flex; gap:10px; align-items:center;
  }
  #campo{
    flex:1;
    border: 1px solid var(--cinza-borda);
    border-radius: 22px;
    padding: 11px 18px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
  }
  #campo:focus{ border-color: var(--azul-bracell); }
  #enviar{
    width: 44px; height: 44px;
    border:none; border-radius:50%;
    background: var(--azul-bracell);
    color:#fff; font-size:20px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  #enviar:hover{ background: var(--azul-escuro); }
  .rodape{ text-align:center; font-size:11.5px; color:var(--texto-suave); margin-top:8px; }

  /* scrollbar discreta */
  .chat::-webkit-scrollbar{ width:8px; }
  .chat::-webkit-scrollbar-thumb{ background:#d3d8d4; border-radius:4px; }
</style>

<body>

  <header>
    <img class="logo-img" src="logo-bracell-branco.png" alt="Bracell">

    <div class="titulo">
      <h1>S4 Sync Agent</h1>

  </header>

  <main class="chat" id="chat">
    <div class="chat-inner" id="chatInner"></div>

  <div class="barra">
    <div class="barra-inner">
      <input id="campo" type="text" placeholder="Escreva sua dúvida…" autocomplete="off" />

function temIntentKU(u){ return KU_INTENT.some(k => u.indexOf(k) !== -1); }

function buscarKeyUsers(texto){
  const u = normalizar(texto);
  const tokens = u.split(" ").filter(t => t.length >= 2 && KU_STOP.indexOf(t) === -1);
  let best = null, bestScore = 0;
  for (const seg in KEYUSERS){
    /* casa PALAVRA INTEIRA (evita "das" achar match em "cadastros") */
    const palavrasAlvo = normalizar(seg + " " + (KU_ALIAS[seg] || "")).split(" ");
    let score = 0;
    tokens.forEach(t => { if (palavrasAlvo.indexOf(t) !== -1) score += 1; });
    if (score > bestScore){ bestScore = score; best = seg; }
  }
  return bestScore > 0 ? best : null;
}

  }).join("\n");
  const nota = temEmail ? "" : "\n\n<em>(Os e-mails desta área ainda não constam na base — confirme no diretório da Bracell.)</em>";
  return "Key Users / pontos focais de <strong>" + seg + "</strong>:\n\n" + linhas + nota +
    "\n\nAcione primeiro o Key User da sua área — ele valida a dúvida e abre o chamado com evidências.";
}

function htmlAskArea(){
  return "De qual área você precisa do Key User? 🧭\n\nDigite o nome da área (ex.: Financeiro, Fiscal, Manutenção, Suprimentos) ou toque em uma abaixo:";
}

/* intenção de "listar as áreas" (quais áreas existem) */
const KU_LISTA_INTENT = ["quais areas","quais as areas","que areas","quais sao as areas","lista de areas","listar areas","todas as areas","ver todas as areas","areas disponiveis","quais setores","lista areas","das areas","por area","de cada area","areas com","keyusers das","key users das","keyusers por","key users por"];
function pedeListaAreas(u){ return KU_LISTA_INTENT.some(function(k){ return u.indexOf(k) !== -1; }); }

/* nome exato de uma área (ex.: clique num chip) */
function areaExata(texto){
  const u = normalizar(texto);
  for (const seg in KEYUSERS){ if (normalizar(seg) === u) return seg; }
  return null;
}

/* texto igual a uma pergunta da base (ex.: clique numa sugestão) */
function perguntaExata(texto){
  const u = normalizar(texto);
  for (const item of PERGUNTAS){ if (normalizar(item.pergunta) === u) return item; }
  return null;
}

function htmlListaAreas(){
  return "Tenho Key Users / pontos focais nestas áreas. Toque em uma para ver quem são:";
}

/* ===== Busca de PESSOA por nome (ex.: "qual o e-mail da fulana") — sempre local ===== */
const PESSOAS = [];
for (const _area in KEYUSERS){
  KEYUSERS[_area].forEach(function(_n){ PESSOAS.push({ nome: _n, area: _area, email: KU_EMAIL[_n] || "" }); });
}
const PESSOA_INTENT = ["email","e mail","e-mail","contato","telefone","falar com","quem e","quem eh","mail de","mail do","mail da","fone"];

function buscarPessoas(texto){
  const u = normalizar(texto);
  const qtokens = u.split(" ").filter(function(t){ return t.length >= 3 && KU_STOP.indexOf(t) === -1; });
  const res = [];
  PESSOAS.forEach(function(p){
    const nomeTokens = normalizar(p.nome).split(" ").filter(function(t){ return t.length >= 3; });
    let score = 0;
    nomeTokens.forEach(function(nt){ if (qtokens.indexOf(nt) !== -1) score += 1; });
    if (score > 0) res.push({ p: p, score: score });
  });
  res.sort(function(a, b){ return b.score - a.score; });
  return res;
}

function htmlPessoas(lista){
  const linhas = lista.map(function(p){
    const e = p.email
      ? (" — <a href=\"mailto:" + p.email + "\">" + p.email + "</a>")
      : " — <em>(e-mail não consta na base)</em>";
    return "• <strong>" + p.nome + "</strong> <span style=\"color:var(--texto-suave)\">(" + p.area + ")</span>" + e;
  }).join("\n");
  return (lista.length > 1 ? "Encontrei estas pessoas:" : "Encontrei:") + "\n\n" + linhas;
}

/* ⬆️ FIM DA BASE DE PERGUNTAS — daqui pra baixo é o funcionamento ⬆️
   (não precisa mexer no resto, a não ser que queira mudar o comportamento)
   =================================================================== */

const chatInner = document.getElementById('chatInner');
const campo = document.getElementById('campo');
const enviar = document.getElementById('enviar');
const chat = document.getElementById('chat');

/* normaliza texto: minúsculas e sem acento, pra comparar melhor */
function normalizar(t){
  return (t || "").toLowerCase()
    .normalize("NFD").replace(/[̀-ͯ]/g, "")
    .replace(/[^a-z0-9\s]/g, " ")
    .replace(/\s+/g, " ").trim();
}

/* dá uma pontuação de quanto a pergunta do usuário combina com cada item */
function pontuar(textoUsuario, item){
  const u = normalizar(textoUsuario);
  const palavrasUsuario = u.split(" ").filter(p => p.length > 2);
  const alvo = normalizar(item.chaves + " " + item.pergunta);
  let pontos = 0;
  palavrasUsuario.forEach(p => {
    if (alvo.includes(p)) pontos += 2;
  });
  /* bônus se a frase inteira aparece */
  if (u.length > 4 && alvo.includes(u)) pontos += 3;
  return pontos;
}

function buscar(texto){
  const ranqueadas = PERGUNTAS
    .map(item => ({ item, pontos: pontuar(texto, item) }))
    .filter(r => r.pontos > 0)
    .sort((a,b) => b.pontos - a.pontos);
  return ranqueadas;
}

/* adiciona um balão na conversa */
function balao(tipo, html){
  const div = document.createElement('div');
  div.className = 'balao ' + tipo;
  div.innerHTML = html;
  chatInner.appendChild(div);
  rolar();
  return div;
}

function rolar(){ chat.scrollTop = chat.scrollHeight; }

/* monta os chips clicáveis de sugestão */
function chips(lista, rotulo){
  const wrap = document.createElement('div');
  if (rotulo){
    const r = document.createElement('div');
    r.className = 'relacionadas';
    const lab = document.createElement('div');
    lab.className = 'rotulo';
    lab.textContent = rotulo;
    r.appendChild(lab);
    wrap.appendChild(r);
  }
  const chipsDiv = document.createElement('div');
  chipsDiv.className = 'chips';
  lista.forEach(item => {
    const c = document.createElement('span');
    c.className = 'chip';
    c.textContent = item.pergunta;
    c.onclick = () => responder(item.pergunta);
    chipsDiv.appendChild(c);
  });
  wrap.appendChild(chipsDiv);
  chatInner.appendChild(wrap);
  rolar();
}

/* Tempo do "digitando…" antes de responder (em milissegundos).
   Ajuste aqui se quiser mais rápido ou mais lento. */
const ESPERA_MIN = 900;    /* mínimo */
const ESPERA_MAX = 2200;   /* máximo */

/* mostra o balão de "digitando…" e devolve o elemento pra remover depois */
function mostrarDigitando(){
  const div = document.createElement('div');
  div.className = 'balao bot digitando';
  div.innerHTML = '<span></span><span></span><span></span>';
  chatInner.appendChild(div);
  rolar();
  return div;
}

/* mostra a resposta do bot com o "digitando…" e um tempo natural */
function animarResposta(respHtml, chipsLista, chipsRotulo){
  const espera = Math.min(ESPERA_MAX, Math.max(ESPERA_MIN, respHtml.length * 9));
  const digitando = mostrarDigitando();
  setTimeout(() => {
    digitando.remove();
    balao('bot', respHtml.replace(/\n/g, "<br>"));
    if (chipsLista){ chips(chipsLista, chipsRotulo); }
  }, espera);
}

/* consulta a IA (porteiro). Retorna texto ou null se indisponível/erro. */
async function callAI(pergunta){
  if (!AI_ENDPOINT) return null;
  try{
    const ctrl = new AbortController();
    const timer = setTimeout(function(){ ctrl.abort(); }, 15000);
    const r = await fetch(AI_ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ pergunta: pergunta }),
      signal: ctrl.signal
    });
    clearTimeout(timer);
    if (!r.ok) return null;
    const j = await r.json();
    return (j && j.resposta && j.resposta.trim()) ? j.resposta.trim() : null;
  }catch(e){ return null; }
}

/* formata a resposta da IA com segurança (escapa HTML, vira links, negrito) */
function formatarAI(txt){
  let s = escapar(txt);
  s = s.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank">$1</a>');
  s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  return s.replace(/\n/g, "<br>");
}

/* fluxo principal. Ordem de decisão:
   1) Pediu "key user/ponto focal" -> lista local (NUNCA vai para a IA)
   2) Base de palavras-chave com match forte -> resposta instantânea
   3) IA (se configurada e online) para perguntas "tortas"/sem match forte
   4) Fallback sem IA: melhor da base, depois área, depois mensagem padrão */
let aguardandoArea = false;   /* true logo após perguntar "de qual área?" */

async function responder(texto){
  texto = (texto || "").trim();
  if (!texto) return;

  balao('user', escapar(texto));
  campo.value = "";

  const u = normalizar(texto);
  const eraAguardandoArea = aguardandoArea;
  aguardandoArea = false;

  /* 0) Nome exato de uma área (ex.: clique num chip) -> lista os Key Users */
  const segExata = areaExata(texto);
  if (segExata){ animarResposta(htmlKeyUsers(segExata), null, null); return; }

  /* 0b) Pediu a lista de áreas -> mostra todas como botões clicáveis */
  if (pedeListaAreas(u)){
    aguardandoArea = true;
    const todas = Object.keys(KEYUSERS).map(function(s){ return { pergunta: s }; });
    animarResposta(htmlListaAreas(), todas, null);
    return;
  }

  /* 1) Key Users — pedido explícito (sempre local) */
  if (temIntentKU(u)){
    const seg = buscarKeyUsers(texto);
    if (seg){
      animarResposta(htmlKeyUsers(seg), null, null);
    } else {
      aguardandoArea = true;
      const chipsArea = SEG_DESTAQUE.map(function(s){ return { pergunta: s }; });
      chipsArea.push({ pergunta: "Ver todas as áreas" });
      animarResposta(htmlAskArea(), chipsArea, null);
    }
    return;
  }

  /* 1b) Acabou de perguntar a área -> interpretar a resposta como a área escolhida */
  if (eraAguardandoArea){
    const segArea = buscarKeyUsers(texto);
    if (segArea){ animarResposta(htmlKeyUsers(segArea), null, null); return; }
    /* não reconheceu a área: segue o fluxo normal abaixo */
  }

  /* 1c) Pergunta por uma PESSOA pelo nome (ex.: "email da fulana") -> local, nunca vai à IA */
  const pessoaIntent = PESSOA_INTENT.some(function(k){ return u.indexOf(k) !== -1; });
  const pessoas = buscarPessoas(texto);
  if (pessoas.length > 0 && (pessoas[0].score >= 2 || (pessoaIntent && pessoas[0].score >= 1))){
    const topo = pessoas[0].score;
    const escolhidos = pessoas.filter(function(x){ return x.score === topo; }).slice(0, 10).map(function(x){ return x.p; });
    animarResposta(htmlPessoas(escolhidos), null, null);
    return;
  }

  /* 2) Clique numa sugestão (texto = pergunta da base) -> resposta canônica instantânea */
  const exata = perguntaExata(texto);
  if (exata){
    const rel = buscar(texto).filter(function(r){ return r.item !== exata; }).slice(0, QTD_SUGESTOES).map(function(r){ return r.item; });
    animarResposta(exata.resposta, rel.length ? rel : null, rel.length ? "Veja também:" : null);
    return;
  }

  /* 3) IA como cabeça principal para texto livre (interpreta a intenção) */
  if (AI_ENDPOINT){
    const digitando = mostrarDigitando();
    const aiTxt = await callAI(texto);
    digitando.remove();
    if (aiTxt){
      balao('bot', formatarAI(aiTxt));
      return;
    }
    /* IA indisponível/erro -> segue para o fallback da base abaixo */
  }

  /* 4) Fallback sem IA: melhor da base, depois área, depois mensagem padrão */
  const resultados = buscar(texto);
  if (resultados.length > 0){
    const outras = resultados.slice(1, QTD_SUGESTOES + 1).map(function(r){ return r.item; });
    animarResposta(resultados[0].item.resposta, outras.length ? outras : null, outras.length ? "Veja também:" : null);
    return;
  }
  const seg2 = buscarKeyUsers(texto);
  if (seg2){ animarResposta(htmlKeyUsers(seg2), null, null); return; }
  animarResposta(SEM_RESPOSTA, PERGUNTAS.slice(0, QTD_SUGESTOES), "Talvez uma destas ajude:");
}

function escapar(t){
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

/* Atraso da mensagem de boas-vindas (menor que o das respostas) */
const ESPERA_BOAS_VINDAS = 650;

/* saudação inicial — aparece com um pequeno "digitando…" antes */
function iniciar(){
  const digitando = mostrarDigitando();
  setTimeout(() => {
    digitando.remove();
    balao('bot', "Olá! Eu sou o <strong>S4 Sync Agent</strong> 🔄<br>Posso ajudar com dúvidas sobre compras no novo SAP S4 HANA. Sobre o que você quer saber?");
    chips(PERGUNTAS.slice(0, QTD_SUGESTOES), "Perguntas mais comuns:");
  }, ESPERA_BOAS_VINDAS);
}

/* eventos */
enviar.onclick = () => responder(campo.value);
campo.addEventListener('keydown', e => { if (e.key === 'Enter') responder(campo.value); });

iniciar();
campo.focus();
</script>
